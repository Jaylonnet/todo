<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo App</title>
</head>

<body>

    <form action="#">

        <div>
            <label for="toDoTitle">Title</label>
            <input type="text" name="toDoTitle" id="toDoTitle">
        </div>

        <div>
            <label for="toDoDesc">Description</label>
            <input type="text" name="toDoDesc" id="toDoDesc">
        </div>

        <div>
            <label for="toDoDueDate">Due date</label>
            <input type="date" name="toDoDueDate" id="toDoDueDate">
        </div>

        <div>
            <label for="toDoPriority">Description</label>
            <input type="text" name="toDoPriority" id="toDoPriority">
        </div>

        <div>
            <button type="button">Add Task</button>
        </div>
    </form>

    <h2>Projects</h2>

    <h2>Tasks</h2>

</body>

</html>
