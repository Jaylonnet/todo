<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo App</title>
</head>

<body>

    <div class="container">
        <div id="logo">
            <h1>TaskTackler</h1>
        </div>



        <div id="projects">
            <h2>Projects</h2>

            <form action="#" id="createProjectForm">
                <h2>Create New Project</h2>

                <div>
                    <p><label for="projectTitle">Project Title</label></p>
                    <input type="text" name="projectTitle" id="projectTitle">
                </div>
                <div><button type="button" id="createProjectBtn">Create Project</button></div>
            </form>

        </div>


        <div id="tasks">

            <h2>Tasks</h2>

            <form action="#" id="createTaskForm">
                <h2>Create Task</h2>
                <div>
                    <input type="text" name="taskTitle" id="taskTitle" placeholder="Title">
                </div>

                <div>
                    <input type="date" name="taskDueDate" id="taskDueDate">
                </div>

                <div>
                    <input type="text" name="taskPriority" id="taskPriority">
                </div>

                <div>
                    <button type="button" id="createTaskBtn">Add Task</button>
                </div>
            </form>

        </div>

    </div>

</body>

</html>
